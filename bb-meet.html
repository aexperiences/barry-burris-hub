<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Join your visit · Barry Burris, NMD</title>
<link rel="icon" type="image/svg+xml" href="bee-mark.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#4a6b52">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#faf4e8;--ink:#26313a;--mut:#6b7a70;--sage:#4a6b52;--sage2:#3d5a45;--gold:#c9992f;--gold2:#e6c67e;--line:#e6ddca}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(1200px 500px at 50% -10%,#f1ead9,var(--cream));color:#26313a;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}
  .card{width:100%;max-width:440px;background:#fffdf8;border:1px solid var(--line);border-radius:20px;
    box-shadow:0 20px 60px rgba(60,40,20,.14);padding:30px 28px;text-align:center}
  .coin{width:74px;height:74px;border-radius:50%;margin:0 auto 14px;display:block;box-shadow:0 0 0 1px rgba(230,198,126,.4)}
  h1{font-family:Fraunces,Georgia,serif;font-weight:700;font-size:23px;margin:0 0 3px;color:#2f4a39;letter-spacing:-.2px}
  .sub{color:#6b7a70;font-size:14px;margin:0 0 20px}
  label{display:block;text-align:left;font-size:12.5px;font-weight:600;color:#5c6b60;margin:14px 2px 6px}
  input,select{width:100%;border:1px solid var(--line);background:#fff;border-radius:11px;padding:12px 13px;font:inherit;font-size:15px;color:var(--ink)}
  input:focus,select:focus{outline:none;border-color:var(--gold)}
  .go{margin-top:20px;width:100%;border:none;border-radius:12px;padding:14px;font:inherit;font-weight:700;font-size:15.5px;
    color:#fff;background:linear-gradient(180deg,var(--sage),var(--sage2));cursor:pointer;transition:filter .12s}
  .go:hover{filter:brightness(1.06)}
  .go:disabled{opacity:.6;cursor:default}
  .fine{margin-top:16px;font-size:11.5px;color:#8a9990;line-height:1.5}
  .fine b{color:#5c6b60}
  .foot{margin-top:18px;font-size:11px;color:#a99}
  .foot b{color:var(--gold)}
</style>
</head>
<body>
  <main class="card" role="main">
    <img class="coin" src="bee-mark.svg" alt="Barry Burris, NMD">
    <h1>Your video visit</h1>
    <p class="sub">with <b>Barry Burris, NMD</b> · Functional Medicine &amp; Longevity</p>

    <label for="nm">Your name</label>
    <input id="nm" autocomplete="name" placeholder="First and last name" autofocus>

    <label for="lang">Your language</label>
    <select id="lang">
      <option value="en">English</option>
      <option value="vi">Tiếng Việt (Vietnamese)</option>
      <option value="es">Español (Spanish)</option>
    </select>

    <button class="go" id="go" type="button">Join the visit →</button>

    <p class="fine">Opens in your browser — <b>no app, no account</b>. Please allow your camera &amp; microphone when asked. Your video connects directly and privately.</p>
    <p class="foot">Secure telehealth by <b>Accelerated Experiences, LLC</b></p>
  </main>

<script src="bb-translate.js"></script>
<script src="bb-rtc.js"></script>
<script>
  (function(){
    var params = new URLSearchParams(location.search);
    var room = params.get('room') || (window.BBTele && BBTele.officeRoom && BBTele.officeRoom());
    var nm = document.getElementById('nm'), lang = document.getElementById('lang'), go = document.getElementById('go');
    // guess language from the browser (VN/ES) as a friendly default
    try { var bl=(navigator.language||'').slice(0,2); if(bl==='vi'||bl==='es') lang.value=bl; } catch(e){}
    function join(){
      var name = (nm.value||'').trim(); if(!name){ nm.focus(); return; }
      go.disabled = true;
      BBTele.open({ room: room, displayName: name, outreach: true, myLang: lang.value,
        subject: 'Telehealth visit — Barry Burris, NMD',
        onClose: function(){ go.disabled = false; } });
    }
    go.addEventListener('click', join);
    nm.addEventListener('keydown', function(e){ if(e.key==='Enter') join(); });
  })();
</script>
</body>
</html>
