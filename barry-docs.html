<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Documents · Barry Burris, NMD</title>
<link rel="icon" type="image/svg+xml" href="bee-coin.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf4e8;--card:#fffdf7;--ink:#40352a;--ink2:#63543f;--mut:#8a7c68;--line:#e8dcc4;
 --teal:#5f8f6c;--teal2:#3f6b4e;--gold:#c9992f;--gold2:#e6c67e;--gold-soft:#f8efd6;
 --good:#4e7433;--bad:#b3261e;--shadow:0 10px 30px rgba(60,40,20,.09)}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);display:flex;flex-direction:column;min-height:100vh}
a{color:inherit}
h1,h2,h3{font-family:Fraunces,Georgia,serif;margin:0}
header{background:linear-gradient(180deg,#4a6b52,#3d5a45);color:#f4e8d0;padding:11px 0;position:sticky;top:0;z-index:30;box-shadow:0 6px 20px rgba(0,0,0,.22)}
.hb{max-width:1320px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:11px}
.hb .back{font-size:20px;text-decoration:none;color:#e6c67e;flex:none}
.coin{width:34px;height:34px;border-radius:50%;flex:none;box-shadow:0 0 0 1px rgba(230,198,126,.35)}
.htitle{font-family:Fraunces,serif;font-weight:700;font-size:19px;color:#e6c67e;line-height:1}.hsub{font-size:11px;color:#b8a986;margin-top:2px}.sp{flex:1}
.hbtn{background:rgba(255,255,255,.10);border:1px solid rgba(230,198,126,.25);color:#f4e8d0;border-radius:9px;padding:7px 11px;font-size:12.5px;cursor:pointer;text-decoration:none}
.hchip{font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid rgba(230,198,126,.3);color:#e6c67e;white-space:nowrap}
.wrap{max-width:1320px;margin:0 auto;padding:16px;display:flex;gap:16px;flex:1;width:100%;min-height:0}
.side{width:270px;flex:none;display:flex;flex-direction:column;gap:10px}
.side .newbtn{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#3a2b08;border:none;border-radius:11px;padding:12px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;box-shadow:var(--shadow)}
.doclist{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:auto;max-height:calc(100vh - 220px)}
.docrow{padding:11px 13px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;flex-direction:column;gap:3px}
.docrow:last-child{border-bottom:none}
.docrow:hover{background:#f7f1e2}
.docrow.on{background:var(--gold-soft)}
.docrow .dt{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.docrow .dp{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.docrow .dd{font-size:10.5px;color:var(--mut)}
.empty-side{padding:20px 14px;color:var(--mut);font-size:12.5px;text-align:center}
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.note{background:var(--gold-soft);border-bottom:1px solid #e7d29a;color:#6b551f;font-size:12px;padding:8px 16px;line-height:1.5}
.note b{color:#5a4413}
.note.live{background:#eaf2e0;border-color:#c7dcae;color:#33501f}
.note.live b{color:#264014}
.titlebar{padding:14px 18px 8px}
.titlebar input{width:100%;border:none;background:transparent;font-family:Fraunces,Georgia,serif;font-weight:700;font-size:24px;color:var(--ink);padding:2px 0}
.titlebar input:focus{outline:none}
.titlebar input::placeholder{color:#c9bd9f}
.toolbar{display:flex;align-items:center;gap:3px;flex-wrap:wrap;padding:8px 14px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#fbf7ec}
.toolbar button{border:1px solid transparent;background:transparent;color:var(--ink2);border-radius:8px;width:32px;height:32px;font-size:14.5px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.toolbar button:hover{background:#efe6cf}
.toolbar button.on{background:var(--gold-soft);border-color:#e7d29a;color:#6b551f}
.toolbar .sep{width:1px;height:22px;background:var(--line);margin:0 5px}
.toolbar .sp{flex:1}
.toolbar .mic{width:auto;padding:0 12px;gap:7px;font-weight:700;font-size:12.5px;font-family:Inter,sans-serif;white-space:nowrap;flex:none}
.toolbar .mic.on{background:var(--bad);border-color:var(--bad);color:#fff;animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(179,38,30,.4)}50%{box-shadow:0 0 0 6px rgba(179,38,30,0)}}
.toolbar .savebtn{width:auto;background:linear-gradient(180deg,var(--teal),var(--teal2));color:#fff;border:none;border-radius:9px;padding:0 15px;height:32px;font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap;flex:none}
.toolbar .savebtn:disabled{opacity:.5;cursor:default}
.toolbar .dlbtn{width:auto;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:0 13px;height:32px;font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap;flex:none}
.toolbar .delbtn{width:auto;background:var(--card);border:1px solid #e6bdb9;color:var(--bad);border-radius:9px;padding:0 13px;height:32px;font-weight:600;font-size:12.5px;cursor:pointer;white-space:nowrap;flex:none}
#editor{flex:1;overflow:auto;padding:8px 26px 40px;font-size:15.5px;line-height:1.7;color:var(--ink)}
#editor:focus{outline:none}
#editor h1{font-family:Fraunces,Georgia,serif;font-size:26px;margin:.6em 0 .3em}
#editor h2{font-family:Fraunces,Georgia,serif;font-size:20px;margin:.6em 0 .3em}
#editor p{margin:0 0 .8em}
#editor ul,#editor ol{margin:0 0 .8em;padding-left:1.4em}
#editor a{color:var(--teal2)}
#editor:empty:before{content:attr(data-ph);color:#b8ab8c}
.statusline{padding:6px 18px;font-size:11px;color:var(--mut);border-top:1px solid var(--line);display:flex;justify-content:space-between}
.cred{text-align:center;color:#9aa6b2;font-size:11.5px;padding:10px 0 4px}
@media(max-width:860px){.wrap{flex-direction:column}.side{width:100%}.doclist{max-height:220px}}
</style>
</head>
<body>
<header><div class="hb">
  <a class="back" href="barry-burris-hub.html" title="Back to the hub">←</a>
  <img class="coin" id="coin" alt="BB">
  <div><div class="htitle">Documents</div><div class="hsub">Barry Burris, NMD · write &amp; save real documents</div></div>
  <div class="sp"></div>
  <span class="hchip" id="modeChip">checking…</span>
  <a class="hbtn" href="barry-signin.html">Menu</a>
</div></header>

<div class="wrap">
  <div class="side">
    <button class="newbtn" onclick="newDoc()">＋ New document</button>
    <div class="doclist" id="docList"><div class="empty-side">Loading…</div></div>
  </div>
  <div class="main">
    <div class="note" id="modeNote">Checking whether the hub's document server is connected…</div>
    <div class="titlebar"><input id="titleIn" placeholder="Untitled document" oninput="markDirty()"></div>
    <div class="toolbar">
      <button onclick="cmd('bold')" title="Bold"><b>B</b></button>
      <button onclick="cmd('italic')" title="Italic"><i>I</i></button>
      <button onclick="cmd('underline')" title="Underline"><u>U</u></button>
      <span class="sep"></span>
      <button onclick="cmd('formatBlock','H1')" title="Heading">H1</button>
      <button onclick="cmd('formatBlock','H2')" title="Subheading">H2</button>
      <button onclick="cmd('formatBlock','P')" title="Paragraph">¶</button>
      <span class="sep"></span>
      <button onclick="cmd('insertUnorderedList')" title="Bullet list">•‒</button>
      <button onclick="cmd('insertOrderedList')" title="Numbered list">1‒</button>
      <span class="sep"></span>
      <button onclick="makeLink()" title="Link">🔗</button>
      <div class="sp"></div>
      <button class="mic" id="micBtn" onclick="toggleDictation()" title="Dictate — Barry speaks, Brian writes it down">🎙️ <span id="micLbl">Dictate</span></button>
      <button class="dlbtn" onclick="downloadWord()" title="Download a real .doc file — opens in Microsoft Word and imports cleanly into Google Docs">⭳ Download .doc</button>
      <button class="delbtn" id="delBtn" onclick="deleteDoc()" style="display:none">Delete</button>
      <button class="savebtn" id="saveBtn" onclick="saveDoc()">Save</button>
    </div>
    <div id="editor" contenteditable="true" data-ph="Start writing, or tap Dictate and talk — Brian writes it down." oninput="markDirty()"></div>
    <div class="statusline"><span id="statusL">New, unsaved document.</span><span>Barry Burris, NMD · Documents</span></div>
  </div>
</div>
<div class="cred">Documents by <b>Accelerated Experiences, LLC</b></div>

<script src="bb-translate.js"></script>
<script>
var COIN="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='0'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%23f4e0a6'/%3E%3Cstop%20offset='.5'%20stop-color='%23c6a04a'/%3E%3Cstop%20offset='1'%20stop-color='%238f6f2e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle%20cx='50'%20cy='50'%20r='49'%20fill='%230e1d30'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='45'%20fill='none'%20stroke='url(%23g)'%20stroke-width='2.4'/%3E%3Ctext%20x='50'%20y='64'%20font-family='Georgia,serif'%20font-size='41'%20font-weight='700'%20fill='url(%23g)'%20text-anchor='middle'%3EBB%3C/text%3E%3C/svg%3E";
document.getElementById('coin').src='bee-coin.svg';

var API='/api/docs';
var LIVE=null;              // true = real KV backend; false = on-device only (both are REAL, just different reach)
var LOCAL_KEY='bb_docs_local';
var curId=null, dirty=false, docs=[];
var ed=document.getElementById('editor'), titleIn=document.getElementById('titleIn');

function api(doName,args){
  return fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(Object.assign({do:doName},args))})
    .then(function(r){return r.json();}).catch(function(){return {ok:false,reason:'net'};});
}
function lsGet(k,d){try{var v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function setMode(live){
  LIVE=live;
  var chip=document.getElementById('modeChip'), note=document.getElementById('modeNote');
  if(live){
    chip.textContent='Saved to the hub';
    note.className='note live';
    note.innerHTML='<b>Connected.</b> Documents save to the practice hub and are here whenever you come back — from any device.';
  }else{
    chip.textContent='Saved on this device';
    note.className='note';
    note.innerHTML='<b>On-device (Lane A).</b> The hub’s document server isn’t connected yet, so documents save right here in this browser — real saves, just not synced across devices. That turns on with the secure-hosting step. <b>Download for Word/Google Docs always works</b>, either way.';
  }
}

function refreshList(){
  if(LIVE){
    api('list',{}).then(function(r){
      if(!r||!r.ok){setMode(false);loadLocalList();return;}
      docs=r.docs||[];renderList();
    });
  }else loadLocalList();
}
function loadLocalList(){
  var store=lsGet(LOCAL_KEY,{});
  docs=Object.keys(store).map(function(id){var d=store[id];return {id:id,title:d.title,updatedAt:d.updatedAt,preview:(d.html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,140)};});
  renderList();
}
function renderList(){
  docs.sort(function(a,b){return (b.updatedAt||0)-(a.updatedAt||0);});
  var el=document.getElementById('docList');
  if(!docs.length){el.innerHTML='<div class="empty-side">No documents yet — write your first one.</div>';return;}
  el.innerHTML=docs.map(function(d){
    var dt=new Date(d.updatedAt||Date.now());
    return '<div class="docrow'+(d.id===curId?' on':'')+'" onclick="openDoc(\''+d.id+'\')"><div class="dt">'+esc(d.title||'Untitled document')+'</div><div class="dp">'+esc(d.preview||'')+'</div><div class="dd">'+dt.toLocaleDateString()+' '+dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div></div>';
  }).join('');
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function newDoc(){
  curId=null;dirty=false;
  titleIn.value='';ed.innerHTML='';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('statusL').textContent='New, unsaved document.';
  renderList();titleIn.focus();
}
function openDoc(id){
  if(dirty&&!confirm('Discard unsaved changes to this document?'))return;
  if(LIVE){
    api('get',{id:id}).then(function(r){
      if(!r||!r.ok){toast('Could not open that document.');return;}
      loadIntoEditor(r.doc);
    });
  }else{
    var store=lsGet(LOCAL_KEY,{});var d=store[id];
    if(!d){toast('Could not open that document.');return;}
    loadIntoEditor(Object.assign({id:id},d));
  }
}
function loadIntoEditor(d){
  curId=d.id;dirty=false;
  titleIn.value=d.title||'';ed.innerHTML=d.html||'';
  document.getElementById('delBtn').style.display='inline-block';
  document.getElementById('statusL').textContent='Saved '+new Date(d.updatedAt||Date.now()).toLocaleString();
  renderList();
}
function markDirty(){dirty=true;document.getElementById('statusL').textContent='Unsaved changes…';}

function saveDoc(){
  var title=(titleIn.value||'').trim()||'Untitled document';
  var html=ed.innerHTML;
  if(LIVE){
    api('save',{id:curId,title:title,html:html}).then(function(r){
      if(!r||!r.ok){setMode(false);saveLocal(title,html);return;}
      curId=r.id;dirty=false;
      document.getElementById('delBtn').style.display='inline-block';
      document.getElementById('statusL').textContent='Saved '+new Date(r.updatedAt).toLocaleString();
      refreshList();toast('Saved to the hub');
    });
  }else saveLocal(title,html);
}
function saveLocal(title,html){
  var store=lsGet(LOCAL_KEY,{});
  var id=curId||('doc-'+Date.now().toString(36)+Math.random().toString(36).slice(2,8));
  var now=Date.now();
  store[id]={title:title,html:html,updatedAt:now};
  lsSet(LOCAL_KEY,store);
  curId=id;dirty=false;
  document.getElementById('delBtn').style.display='inline-block';
  document.getElementById('statusL').textContent='Saved on this device '+new Date(now).toLocaleString();
  loadLocalList();toast('Saved on this device');
}
function deleteDoc(){
  if(!curId||!confirm('Delete this document? This can’t be undone.'))return;
  if(LIVE){
    api('del',{id:curId}).then(function(){newDoc();refreshList();toast('Deleted');});
  }else{
    var store=lsGet(LOCAL_KEY,{});delete store[curId];lsSet(LOCAL_KEY,store);
    newDoc();loadLocalList();toast('Deleted');
  }
}

/* ---- formatting toolbar (contenteditable + execCommand — still the real, working,
   dependency-free way browsers expose rich-text editing commands) ---- */
function cmd(name,val){ed.focus();document.execCommand(name,false,val||null);markDirty();}
function makeLink(){
  var url=prompt('Link URL:');if(!url)return;
  ed.focus();document.execCommand('createLink',false,url);markDirty();
}

/* ---- voice dictation — the SAME on-device speech recognition Brian's chat mic uses,
   pointed at the document instead of a chat box. Barry speaks, it types, for real. ---- */
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var recog=null, dictating=false;
function toggleDictation(){
  if(!SR){toast('Dictation needs Chrome or Safari on this device.');return;}
  if(dictating){stopDictation();return;}
  ed.focus();
  recog=new SR();recog.lang='en-US';recog.interimResults=true;recog.continuous=true;recog.maxAlternatives=1;
  recog.onstart=function(){
    dictating=true;
    var b=document.getElementById('micBtn');b.classList.add('on');document.getElementById('micLbl').textContent='Listening… tap to stop';
  };
  recog.onresult=function(e){
    var chunk='';
    for(var i=e.resultIndex;i<e.results.length;i++){var r=e.results[i];if(r.isFinal)chunk+=r[0].transcript;}
    if(chunk){document.execCommand('insertText',false,chunk+' ');markDirty();}
  };
  recog.onerror=function(){stopDictation();};
  recog.onend=function(){if(dictating){try{recog.start();return;}catch(e){}}stopDictation();};
  try{recog.start();}catch(e){toast('Could not start the microphone.');}
}
function stopDictation(){
  dictating=false;
  if(recog){try{recog.stop();}catch(e){}}
  var b=document.getElementById('micBtn');if(b){b.classList.remove('on');document.getElementById('micLbl').textContent='Dictate';}
}

/* ---- real download for Word / Google Docs — a genuine legacy Word (.doc) file: valid
   XML Word will open natively, and Google Docs imports cleanly (File > Open > Upload).
   Zero dependencies, works with the backend live or dormant. ---- */
function downloadWord(){
  var title=(titleIn.value||'Untitled document').trim();
  var body=ed.innerHTML||'<p></p>';
  var doc='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'
    +'<head><meta charset="utf-8"><title>'+esc(title)+'</title>'
    +'<style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;color:#222}h1{font-size:20pt}h2{font-size:15pt}</style></head>'
    +'<body>'+body+'</body></html>';
  var blob=new Blob(['﻿',doc],{type:'application/msword'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=(title||'document').replace(/[\\/:*?"<>|]/g,'-')+'.doc';
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},400);
  toast('Downloaded — opens in Word, or Google Docs via File → Open → Upload');
}

function toast(m){
  var n=document.createElement('div');n.textContent=m;
  n.style.cssText='position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#16171d;color:#fff;padding:11px 17px;border-radius:11px;font-weight:600;font-size:13.5px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.3)';
  document.body.appendChild(n);setTimeout(function(){n.remove();},2200);
}

window.addEventListener('beforeunload',function(e){if(dirty){e.preventDefault();e.returnValue='';}});

// boot: probe the real backend once; fall back to on-device honestly if it's not connected.
api('ping',{}).then(function(r){
  setMode(!!(r&&r.ok));
  refreshList();
}).catch(function(){setMode(false);refreshList();});
newDoc();
</script>
</body>
</html>
