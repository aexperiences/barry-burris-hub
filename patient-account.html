<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="light">
<title>Patient Portal · Barry Burris, NMD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
<style>
:root{--bg:#faf4e8;--paper:#fffdf7;--card:#fffdf7;--ink:#40352a;--mut:#6f6047;--line:#e8dcc4;
 --navy:#16171d;--navy2:#101116;--teal:#0e7c84;--teal2:#0b5a61;--teal-soft:#e2f1f2;--gold:#c9992f;--gold2:#e6c67e;--gold-soft:#f8efd6;
 --good:#3f6b2b;--good-soft:#e7f0dc;--warn:#7c5417;--warn-soft:#f7ead0;--bad:#a51f16;--bad-soft:#f6e2df;--info:#0e5f84;--info-soft:#e0eef5;
 --shadow:0 10px 30px rgba(60,40,20,.09);--shadow2:0 18px 48px rgba(60,40,20,.16);--ring:0 0 0 3px rgba(14,124,132,.35)}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);-webkit-text-size-adjust:100%}
h1,h2,h3,h4{font-family:Fraunces,Georgia,serif;margin:0}
a{color:var(--teal);text-decoration:none}a:hover{text-decoration:underline}
.lbl{font-family:Oswald,sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--mut);font-weight:600}
.hide{display:none!important}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.skip{position:absolute;left:8px;top:-60px;background:var(--teal);color:#fff;padding:10px 15px;border-radius:9px;z-index:3000;font-weight:700;transition:top .15s}.skip:focus{top:8px;text-decoration:none}
.mono{font-variant-numeric:tabular-nums}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;box-shadow:none;border-radius:8px}
.tabs button:focus-visible,.langtog button:focus-visible,.seg button:focus-visible,.tbtn2:focus-visible{outline-offset:-2px}
.side a.nl:focus-visible{outline-color:var(--gold2)}
button{font-family:inherit}
.demo-flag{position:fixed;right:-34px;top:20px;transform:rotate(45deg);background:var(--gold);color:#3a2b08;font-family:Oswald,sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.18em;padding:5px 40px;z-index:2500;box-shadow:0 2px 8px rgba(0,0,0,.2);pointer-events:none}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

/* ---------- sign-in ---------- */
#signin{min-height:100vh;display:flex;flex-direction:column}
.si-ribbon{background:var(--gold-soft);border-bottom:1px solid #e7d29a;color:#6b551f;font-size:12.5px;text-align:center;padding:8px 14px}
.si-ribbon b{font-weight:700}
.si-topbar{max-width:980px;width:100%;margin:0 auto;padding:14px 18px 0;display:flex;align-items:center;gap:12px}
.si-wrap{flex:1;max-width:980px;width:100%;margin:0 auto;padding:12px 18px 50px}
.si-head{display:flex;align-items:center;gap:14px;margin:6px 0 20px}
.si-head .coin{width:54px;height:54px;border-radius:50%;box-shadow:0 0 0 1px rgba(230,198,126,.5)}
.si-head .bn{font-family:Fraunces,serif;font-weight:700;font-size:26px;color:var(--ink);line-height:1.05}
.si-head .bt{font-family:Oswald,sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-top:3px}
.si-grid{display:grid;grid-template-columns:1fr .9fr;gap:24px;align-items:start}@media(max-width:820px){.si-grid{grid-template-columns:1fr}}
.si-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:22px 24px 24px}
.si-value h2{font-size:23px;line-height:1.15;margin-bottom:10px}
.si-value p{color:var(--mut);font-size:14px;line-height:1.6;margin:0 0 16px}
.si-feat{display:flex;gap:11px;align-items:flex-start;margin:11px 0}
.si-feat .fi{width:34px;height:34px;border-radius:10px;background:var(--teal-soft);color:var(--teal);display:flex;align-items:center;justify-content:center;flex:none}
.si-feat .ft{font-weight:700;font-size:13.5px}.si-feat .fd{color:var(--mut);font-size:12.5px;margin-top:1px}
.tabs{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:16px}
.tabs button{flex:1;border:none;background:var(--paper);padding:11px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;color:var(--mut)}
.tabs button.on{background:var(--teal);color:#fff}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin-bottom:5px;font-family:Oswald,sans-serif}
.inp{position:relative}
.fld input,.fld select,.fld textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:14px;background:#fbf7ee;color:var(--ink)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:var(--ring)}
.fld input.bad{border-color:var(--bad);background:#fdf4f3}
.peek{position:absolute;right:5px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--teal);cursor:pointer;font-size:12px;min-height:40px;padding:6px 10px;font-family:Oswald,sans-serif;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.err{color:var(--bad);font-size:12px;margin-top:5px;min-height:0}
.err:empty{display:none}
.strength{height:6px;border-radius:99px;background:#eee4cf;overflow:hidden;margin-top:8px}
.strength i{display:block;height:100%;width:0;transition:width .2s,background .2s}
.hint{font-size:11.5px;color:var(--mut);margin-top:6px}
.bigbtn{width:100%;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:15px;color:#fff;cursor:pointer;background:linear-gradient(180deg,var(--teal),var(--teal2));display:flex;align-items:center;justify-content:center;gap:9px}
.bigbtn:hover{filter:brightness(1.06)}.bigbtn:disabled{opacity:.6;cursor:progress}
.linkbtn{border:none;background:none;color:var(--teal);cursor:pointer;font:inherit;font-size:13px;padding:0}
.linkbtn:hover{text-decoration:underline}
.si-alt{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;text-align:center}
.si-foot{text-align:center;color:var(--mut);font-size:11.5px;padding:16px}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp 1s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.pickwrap{margin-top:14px}
.pick{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-height:280px;overflow:auto;padding:2px}
@media(max-width:520px){.pick{grid-template-columns:1fr}}
.pcard{text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;cursor:pointer;transition:.14s;font:inherit;color:inherit}
.pcard:hover,.pcard:focus-visible{border-color:var(--teal);box-shadow:0 6px 16px rgba(14,124,132,.12);transform:translateY(-1px)}
.pcard .pn{font-weight:700;font-size:13.5px}.pcard .pm{color:var(--mut);font-size:11px;margin-top:2px}
.pcard .ptag{display:inline-block;margin-top:7px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--teal);background:var(--teal-soft);border-radius:99px;padding:2px 8px}

/* ---------- app shell ---------- */
.langtog{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fffdf7}
.langtog button{border:none;background:none;padding:7px 11px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--mut);font-family:Oswald,sans-serif;letter-spacing:.06em}
.langtog button.on{background:var(--teal);color:#fff}
#app .side{position:fixed;top:0;left:0;width:242px;height:100vh;z-index:20;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--navy),var(--navy2));color:#f4e8d0;border-right:1px solid #25262e;transform:translateX(0);transition:transform .22s}
.side .brand{display:flex;align-items:center;gap:11px;padding:17px 15px 12px}
.side .brand img{width:38px;height:38px;border-radius:50%;box-shadow:0 0 0 1px rgba(230,198,126,.35)}
.side .bn{font-family:Fraunces,serif;font-weight:700;font-size:16px;color:var(--gold2);line-height:1.05}
.side .bt{font-family:Oswald,sans-serif;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:#9a8a6a;margin-top:3px}
.side .who{margin:4px 14px 8px;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid #26272f;border-radius:11px;display:flex;align-items:center;gap:10px}
.side .who .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#e6c67e,#c9992f);color:#3a2b08;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none}
.side .who .wn{font-weight:700;font-size:13px;color:#f4e8d0;line-height:1.1}
.side .who .wr{font-size:10px;color:#b6a686;font-family:Oswald,sans-serif;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.side nav{flex:1;overflow-y:auto;padding:6px 12px}
.side .grp{font-family:Oswald,sans-serif;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#9a8a6a;margin:14px 8px 5px;padding-top:11px;border-top:1px solid #1f2027}
.side .grp:first-child{margin-top:2px;padding-top:0;border-top:none}
.side a.nl{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:#cdbfa4;text-decoration:none;font-family:Oswald,sans-serif;font-weight:500;font-size:13px;letter-spacing:.045em;text-transform:uppercase;margin:2px 0;cursor:pointer;transition:.15s}
.side a.nl:hover{background:rgba(255,255,255,.06);color:#fff;text-decoration:none}
.side a.nl.active{background:linear-gradient(90deg,rgba(230,198,126,.16),rgba(230,198,126,.02));color:#f4e8d0;box-shadow:inset 3px 0 0 var(--gold2)}
.side a.nl svg{width:18px;height:18px;flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.side a.nl .badge{margin-left:auto;background:var(--teal);color:#fff;font-family:Inter;font-size:10px;font-weight:800;border-radius:99px;padding:1px 7px;min-width:18px;text-align:center}
.side a.nl .tdot{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--gold2)}
.side .foot{padding:11px 15px;border-top:1px solid #25262e;font-size:10px;color:#8f8267;line-height:1.5}
.side .foot b{color:var(--gold2);font-weight:600}.side .foot a{color:#cdbfa4}
.side .secure{display:flex;align-items:center;gap:6px;color:#8fae93;font-size:10px;margin-bottom:6px}
.main{padding-left:242px}
@media(max-width:900px){#app .side{z-index:1200;transform:translateX(-100%);box-shadow:2px 0 22px rgba(0,0,0,.4)}#app .side.open{transform:translateX(0)}.main{padding-left:0}}
.topbar{position:sticky;top:0;z-index:12;background:rgba(250,244,232,.93);backdrop-filter:blur(7px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:10px 20px}
.burger{display:none;width:40px;height:40px;border:1px solid var(--line);background:#fffdf7;color:var(--teal);border-radius:10px;cursor:pointer;align-items:center;justify-content:center}
@media(max-width:900px){.burger{display:flex}}
.topbar .tt{font-family:Fraunces,serif;font-weight:700;font-size:18px}
.sp{flex:1}
.acctbtn{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fffdf7;border-radius:10px;padding:5px 9px 5px 6px;cursor:pointer;font:inherit}
.acctbtn .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#e6c67e,#c9992f);color:#3a2b08;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.acctbtn .an{font-size:12.5px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu{position:absolute;right:20px;top:54px;background:var(--paper);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow2);padding:7px;z-index:40;min-width:190px}
.menu a,.menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:none;background:none;padding:9px 11px;border-radius:9px;font:inherit;font-size:13.5px;color:var(--ink);cursor:pointer;text-decoration:none}
.menu a:hover,.menu button:hover{background:#f4ecdb}
.menu .sep{height:1px;background:var(--line);margin:5px 0}
.content{max-width:1080px;margin:0 auto;padding:20px 20px 90px}
.idlebar{background:var(--warn-soft);border:1px solid #e7d29a;color:#6b551f;border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px}
.idlebar button{margin-left:auto;border:1px solid var(--warn);background:#fff;color:var(--warn);border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer;font-size:12.5px}

/* banners + cards + components */
.demo{background:var(--gold-soft);border:1px solid #e7d29a;color:#6b551f;border-radius:12px;padding:9px 13px;font-size:12.5px;margin-bottom:16px;display:flex;gap:9px;align-items:flex-start}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px}
.card h3{font-size:17px;margin-bottom:3px}.card .csub{color:var(--mut);font-size:12.5px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}@media(max-width:760px){.grid3{grid-template-columns:1fr}}
.hero{background:linear-gradient(120deg,#0e7c84,#0b5a61);color:#eafafb;border:none;position:relative;overflow:hidden}
.hero h2{color:#fff;font-size:23px}.hero p{color:#e9f7f8;font-size:13.5px;margin:6px 0 0;max-width:640px;line-height:1.5}
.qa{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.qa button{border:1px solid rgba(255,255,255,.28);border-radius:11px;padding:11px 15px;font:inherit;font-weight:700;font-size:13.5px;cursor:pointer;background:rgba(0,0,0,.24);color:#fff;display:flex;gap:8px;align-items:center}
.qa button:hover{background:rgba(0,0,0,.36)}
.qa button.gold{background:var(--gold2);color:#3a2b08}.qa button.gold:hover{background:#f0d69a}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{font-size:12px;background:var(--teal-soft);color:#0a5960;border-radius:99px;padding:4px 11px;font-weight:600}
.chip.g{background:var(--gold-soft);color:#75570f}
.kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.kv:last-child{border-bottom:none}.kv .k{color:var(--mut)}.kv .v{font-weight:600;text-align:right}
.status{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:99px}
.status.rev{background:var(--warn-soft);color:var(--warn)}.status.ok{background:var(--good-soft);color:var(--good)}
.status.conf{background:var(--teal-soft);color:#0a5960}.status.act{background:var(--bad-soft);color:var(--bad)}.status.info{background:var(--info-soft);color:var(--info)}
.task{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.task:last-child{border-bottom:none}
.task .tk-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none;background:var(--warn-soft);color:var(--warn)}
.task.done .tk-ic{background:var(--good-soft);color:var(--good)}
.task .tk-t{font-weight:600;font-size:13.5px}.task .tk-d{color:var(--mut);font-size:12px;margin-top:1px}
.task.done .tk-t{text-decoration:line-through;color:var(--mut)}
.task .tk-a{margin-left:auto}
.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font:inherit;font-size:12.5px;color:var(--ink);cursor:pointer;font-weight:600}
.btn:hover{border-color:var(--teal)}
.btn.solid{background:var(--teal);color:#fff;border:none}.btn.solid:hover{filter:brightness(1.06)}
.btn.solid:disabled{background:#c8d6d3;cursor:not-allowed;filter:none}
.btn.ghost{background:none}.btn.gold{background:linear-gradient(180deg,#e6c67e,#c9992f);color:#3a2b08;border:none}
.btn.sm{padding:6px 10px;font-size:12px}
.appt{display:flex;gap:14px;align-items:center;border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:11px;background:#fff;flex-wrap:wrap}
.appt .date{text-align:center;flex:none;width:56px}
.appt .date .mo{font-family:Oswald,sans-serif;text-transform:uppercase;font-size:11px;color:var(--teal);font-weight:700;letter-spacing:.06em}
.appt .date .dy{font-family:Fraunces,serif;font-size:26px;font-weight:700;line-height:1}
.appt .info{flex:1;min-width:150px}.appt .info .ti{font-weight:700;font-size:14.5px}.appt .info .me{color:var(--mut);font-size:12.5px;margin-top:2px}
.appt .acts{display:flex;gap:7px;flex-wrap:wrap}
.check{display:flex;align-items:center;gap:9px;padding:8px 0;font-size:13.5px;cursor:pointer}
.check input{width:17px;height:17px;accent-color:var(--teal);flex:none;cursor:pointer}
table.lab{width:100%;border-collapse:collapse;font-size:13px}
table.lab th{text-align:left;background:#f4ecdb;color:var(--mut);font-family:Oswald,sans-serif;font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px}
table.lab td{padding:9px 10px;border-top:1px solid var(--line);vertical-align:middle}
.rng{position:relative;height:8px;background:linear-gradient(90deg,#f3d9b8,#dbead0 22%,#dbead0 78%,#f3d9b8);border-radius:99px;min-width:120px}
.rng i{position:absolute;top:-3px;width:3px;height:14px;border-radius:2px;background:var(--ink);transform:translateX(-1px)}
.flagpill{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:2px 8px;border-radius:99px}
.flagpill.low{background:var(--warn-soft);color:var(--warn)}.flagpill.high{background:var(--bad-soft);color:var(--bad)}.flagpill.norm{background:var(--good-soft);color:var(--good)}
.doc{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:9px;background:#fff;flex-wrap:wrap}
.doc .ic{width:34px;height:34px;border-radius:9px;background:var(--teal-soft);color:var(--teal);display:flex;align-items:center;justify-content:center;flex:none}
.doc .dn{font-weight:600;font-size:13.5px}.doc .dm{color:var(--mut);font-size:11.5px;margin-top:1px}
.doc .da{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap}
.msgs{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow:auto;padding:6px 2px}
.bub{max-width:78%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.45}
.bub.them{align-self:flex-start;background:#f4ecdb;border:1px solid var(--line);border-bottom-left-radius:5px}
.bub.me{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:5px}
.bub.sys{align-self:center;background:var(--info-soft);color:var(--info);font-size:12px;border-radius:99px;padding:6px 13px;max-width:90%;text-align:center}
.bub .mm{font-size:10px;opacity:.7;margin-top:4px}.bub.me .mm{opacity:.92}
.bub .att{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);border-radius:8px;padding:4px 8px;font-size:11.5px;margin-top:6px}
.bub.them .att{background:#efe7d5}
.composer{display:flex;gap:9px;margin-top:12px;align-items:center}
.composer input[type=text]{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font:inherit;font-size:14px;background:#fff}
.composer input[type=text]:focus{outline:none;border-color:var(--teal);box-shadow:var(--ring)}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.seg button{border:1px solid var(--line);background:#fff;border-radius:99px;padding:6px 13px;font:inherit;font-size:12.5px;cursor:pointer;color:var(--mut);font-weight:600}
.seg button.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.switch{position:relative;width:42px;height:24px;flex:none}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:#d8ccb4;border-radius:99px;transition:.2s;cursor:pointer}
.switch .sl:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.sl{background:var(--teal)}.switch input:checked+.sl:before{transform:translateX(18px)}
.small{font-size:12px;color:var(--mut)}
.note-inline{font-size:12px;color:var(--mut);background:#f7f2e6;border:1px dashed var(--line);border-radius:10px;padding:9px 12px;margin-top:10px}
.sig{border:1px solid var(--line);border-radius:12px;background:#fbf7ee;padding:12px 15px;display:flex;align-items:center;gap:12px}
.sig .sg{font-family:'Fraunces',cursive;font-size:22px;font-weight:600;color:var(--ink);font-style:italic}
.skel{background:linear-gradient(90deg,#f0e7d4,#f7f0e0,#f0e7d4);background-size:200% 100%;animation:sh 1.2s infinite;border-radius:8px}
@keyframes sh{to{background-position:-200% 0}}
.empty{padding:30px;text-align:center;color:var(--mut)}
.empty .em-ic{font-size:30px;opacity:.5}
.foundcard{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:#fff}
.progress{height:8px;background:#eee4cf;border-radius:99px;overflow:hidden}.progress i{display:block;height:100%;background:var(--teal);transition:width .3s}
.pill-tab{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}

/* telehealth */
#tele{position:fixed;inset:0;z-index:2000;background:#0c1116;display:none;flex-direction:column}
#tele.on{display:flex}
.tele-top{display:flex;align-items:center;gap:12px;padding:12px 18px;color:#dfe7ee;border-bottom:1px solid #1d2630}
.tele-top .dot{width:9px;height:9px;border-radius:50%;background:#e6c67e;box-shadow:0 0 0 4px rgba(230,198,126,.16)}
.tele-top .tt{font-family:Fraunces,serif;font-weight:700;font-size:15px;color:#fff}
.tele-top .ts{font-size:11.5px;color:#8ea1b2}
.tele-top .conn{margin-left:auto;display:flex;align-items:center;gap:9px;color:#8ea1b2;font-size:11.5px}
.bars{display:flex;align-items:flex-end;gap:2px;height:15px}
.bars i{width:3px;background:#3a4a57;border-radius:1px}.bars i.on{background:#57d38a}
.tele-body{flex:1;display:flex;min-height:0}
.tele-stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:18px;overflow:hidden}
.provtile{width:min(760px,96%);aspect-ratio:16/9;border-radius:18px;background:radial-gradient(120% 120% at 50% 30%,#14303a,#0c1a22);border:1px solid #1d2630;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cfe;position:relative}
.provtile .pcoin{width:92px;height:92px;border-radius:50%;box-shadow:0 0 0 2px rgba(230,198,126,.5),0 10px 30px rgba(0,0,0,.4)}
.provtile .pnm{font-family:Fraunces,serif;font-weight:700;font-size:20px;color:#fff;margin-top:14px}
.provtile .pst{font-size:13px;color:#8ea1b2;margin-top:5px;display:flex;align-items:center;gap:8px}
.provtile .spin{width:14px;height:14px;border:2px solid rgba(230,198,126,.35);border-top-color:#e6c67e;border-radius:50%;animation:sp 1s linear infinite}
.selftile{position:absolute;right:22px;bottom:22px;width:200px;aspect-ratio:4/3;border-radius:13px;overflow:hidden;background:#10171d;border:1px solid #26323d;display:flex;align-items:center;justify-content:center;color:#66788a;font-size:12px}
.selftile video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.selftile .selflbl{position:absolute;left:8px;bottom:6px;font-size:10px;color:#cfe;background:rgba(0,0,0,.45);padding:2px 7px;border-radius:6px}
@media(max-width:560px){.selftile{width:120px;right:12px;bottom:12px}}
.tele-chat{width:300px;border-left:1px solid #1d2630;background:#0a0f14;display:flex;flex-direction:column;color:#dfe7ee}
.tele-chat.hide2{display:none}
.tele-chat .tch-h{padding:12px 15px;border-bottom:1px solid #1d2630;font-family:Oswald,sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:#8ea1b2}
.tele-chat .tch-b{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.tch-msg{font-size:12.5px;line-height:1.4}.tch-msg .who{color:#8ea1b2;font-size:10.5px}
.tele-chat .tch-c{display:flex;gap:7px;padding:10px;border-top:1px solid #1d2630}
.tele-chat .tch-c input{flex:1;background:#131c24;border:1px solid #26323d;border-radius:9px;color:#fff;padding:8px 10px;font:inherit;font-size:12.5px}
.tele-note{position:absolute;left:50%;top:14px;transform:translateX(-50%);font-size:11.5px;color:#8ea1b2;background:rgba(10,15,20,.7);border:1px solid #1d2630;border-radius:99px;padding:5px 13px;text-align:center;max-width:90%}
.tele-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:15px;border-top:1px solid #1d2630;background:#0a0f14;flex-wrap:wrap}
.tbtn2{width:50px;height:50px;border-radius:50%;border:1px solid #2a3742;background:#18222b;color:#dfe7ee;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.tbtn2:hover{background:#22303b}.tbtn2.off{background:#3a2326;border-color:#5a3138;color:#ffb4b0}
.tbtn2.end{background:#b3261e;border-color:#b3261e;color:#fff;width:auto;padding:0 22px;border-radius:26px;font-weight:800;font-family:Inter;gap:8px}
.tbtn2 svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tbtn2 .cap{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9.5px;color:#8ea1b2;white-space:nowrap}
/* prejoin */
.prejoin{position:absolute;inset:0;background:#0c1116;display:flex;align-items:center;justify-content:center;padding:20px;z-index:3}
.prejoin .pj{width:min(720px,100%);display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:center}
@media(max-width:640px){.prejoin .pj{grid-template-columns:1fr}}
.pj-prev{aspect-ratio:4/3;border-radius:14px;overflow:hidden;background:#10171d;border:1px solid #26323d;display:flex;align-items:center;justify-content:center;color:#66788a;position:relative}
.pj-prev video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.pj-side h3{color:#fff;font-size:19px}.pj-side p{color:#8ea1b2;font-size:12.5px;line-height:1.5}
.pj-side label{display:block;color:#8ea1b2;font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-family:Oswald,sans-serif;margin:11px 0 4px}
.pj-side select{width:100%;background:#131c24;border:1px solid #26323d;border-radius:9px;color:#fff;padding:9px 10px;font:inherit;font-size:13px}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(15,25,40,.55);z-index:1500;display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:26px 12px}
.scrim.on{display:flex}
.sheet{background:var(--paper);width:100%;max-width:620px;border-radius:18px;box-shadow:var(--shadow2);padding:22px 24px 26px;margin:auto}
.sheet h3{font-size:19px;margin-bottom:10px}
.sheet .close{float:right;border:none;background:none;font-size:22px;color:var(--mut);cursor:pointer;line-height:1;width:40px;height:40px;border-radius:9px}
.sheet .close:hover{background:#f4ecdb}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 18px;border-radius:12px;font-weight:600;opacity:0;transition:.25s;z-index:3000;max-width:90%}
.toast.on{opacity:1;transform:translateX(-50%)}
.toast.good{background:#255c34}.toast.bad{background:#7a241c}
#scrim2{display:none;position:fixed;inset:0;background:rgba(15,25,40,.5);z-index:1150}#scrim2.on{display:block}

@media print{
  .side,.topbar,.demo,.demo-flag,.qa,.btn,#scrim2,.burger{display:none!important}
  .main{padding-left:0}.content{max-width:100%;padding:0}
  .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  body{background:#fff}
}

function t(k){return (T[lang]&&T[lang][k]!=null)?T[lang][k]:(T.en[k]!=null?T.en[k]:k);}

/* ================= helpers ================= */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function clean(n){return String(n||'').replace(/\s*\(SAMPLE\)\s*/i,'').trim();}
function firstName(n){var c=clean(n).split(/\s+/);return c.length>2?c[c.length-1]:c[0];}
function initials(n){var c=clean(n).split(/\s+/).filter(Boolean);if(!c.length)return '–';return (c[0][0]+(c.length>1?c[c.length-1][0]:'')).toUpperCase();}
function ageOf(dob){if(!dob)return '—';var d=new Date(dob),n=new Date();if(isNaN(d.getTime()))return '—';var a=n.getFullYear()-d.getFullYear();if(n.getMonth()<d.getMonth()||(n.getMonth()===d.getMonth()&&n.getDate()<d.getDate()))a--;return (isNaN(a)?'—':a);}
function read(k,d){try{var v=JSON.parse(localStorage.getItem(k));return v==null?d:v}catch(e){return d}}
function write(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function moArr(){return lang==='vi'?['Th1','Th2','Th3','Th4','Th5','Th6','Th7','Th8','Th9','Th10','Th11','Th12']:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];}
function fmtDate(d,withYr){return moArr()[d.getMonth()]+' '+d.getDate()+(withYr?', '+d.getFullYear():'');}
function fmtTime(d){try{return d.toLocaleTimeString(lang==='vi'?'vi-VN':'en-US',{hour:'numeric',minute:'2-digit'});}catch(e){var h=d.getHours(),m=('0'+d.getMinutes()).slice(-2),ap=h<12?'AM':'PM';return ((h%12)||12)+':'+m+' '+ap;}}
function toast(m,kind){var e=document.getElementById('toast');e.textContent=m;e.className='toast on'+(kind?' '+kind:'');e.setAttribute('role',kind==='bad'?'alert':'status');e.setAttribute('aria-live',kind==='bad'?'assertive':'polite');clearTimeout(e._t);e._t=setTimeout(function(){e.className='toast';},2400);}
function storageOK(){try{localStorage.setItem('__bbt','1');localStorage.removeItem('__bbt');return true;}catch(e){return false;}}

/* per-patient persistence namespace */
function pid(){var s=Auth.session();if(!s)return 'anon';return s.accountId||('demo'+s.patientIdx);}
function pkey(suffix){return 'bb_pt_'+pid()+'_'+suffix;}
function current(){var s=Auth.session();if(!s||s.patientIdx==null)return null;var p=PATIENTS[s.patientIdx];return p?Object.assign({__i:s.patientIdx},p):null;}

function apptStore(){return read(pkey('appts'),null);}
function seedAppt(p){
  var sub=p.submitted?new Date(p.submitted+'T00:00:00'):new Date();
  var next=new Date(sub);next.setDate(next.getDate()+5);next.setHours(10,0,0,0);
  var today=new Date();today.setHours(0,0,0,0);
  if(next<today){next=new Date(today);next.setDate(next.getDate()+3);next.setHours(10,0,0,0);}
  return [{id:'ap_seed',title:(lang==='vi'?'Tư vấn ban đầu':'Initial consultation'),sub:(lang==='vi'?'Xem lại hồ sơ & xét nghiệm · 45 phút':'Review your intake & labs · 45 min'),when:next.toISOString(),mins:45,mode:'telehealth',status:'conf',confirmed:false}];
}
function getAppts(p){var a=apptStore();if(!a){a=seedAppt(p);write(pkey('appts'),a);}return a.map(function(x){return Object.assign({},x,{whenD:new Date(x.when)});}).sort(function(a,b){return a.whenD-b.whenD;});}
function saveAppts(a){write(pkey('appts'),a.map(function(x){var y=Object.assign({},x);delete y.whenD;return y;}));}

  var out='';var d=new Date();d.setHours(0,0,0,0);var count=0;
  while(count<10){d.setDate(d.getDate()+1);var wd=d.getDay();if(wd===0||wd===6)continue;count++;

    out+='<button aria-pressed="'+(bookSel.day===key)+'" class="'+(bookSel.day===key?'on':'')+'" onclick="bookSet(\'day\',\''+key+'\')">'+moArr()[d.getMonth()]+' '+d.getDate()+'</button>';}

function bookTimes(){
  if(!bookSel.day)return '<p class="small">'+esc(lang==='vi'?'Chọn ngày trước.':'Choose a day first.')+'</p>';
  var slots=['09:00','10:30','13:00','14:30','16:00'];
  var seed=0;for(var i=0;i<bookSel.day.length;i++)seed+=bookSel.day.charCodeAt(i);
  var out='<div class="seg">';var any=false;
  slots.forEach(function(sl,ix){var taken=((seed+ix*7)%10)<4;if(taken){out+='<button disabled style="opacity:.45">'+sl+' · '+esc(t('taken'))+'</button>';}else{any=true;out+='<button aria-pressed="'+(bookSel.time===sl)+'" class="'+(bookSel.time===sl?'on':'')+'" onclick="bookSet(\'time\',\''+sl+'\')">'+sl+'</button>';}});

  document.getElementById('siValueH').textContent=t('valueH');
  document.getElementById('siValueP').textContent=t('valueP');
  document.getElementById('siFeats').innerHTML=[['📹','f1t','f1d'],['📋','f2t','f2d'],['✉️','f3t','f3d']].map(function(f){return '<div class="si-feat"><div class="fi">'+f[0]+'</div><div><div class="ft">'+esc(t(f[1]))+'</div><div class="fd">'+esc(t(f[2]))+'</div></div></div>';}).join('');
  document.getElementById('tabSignin').textContent=t('tabSignin');
  document.getElementById('tabCreate').textContent=t('tabCreate');
  document.getElementById('lName').textContent=t('name');
  document.getElementById('lEmail').textContent=t('email');
  document.getElementById('lPass').textContent=t('password');
  document.getElementById('peekBtn').textContent=peek?t('hide'):t('show');
  document.getElementById('forgotBtn').textContent=t('forgot');
  document.getElementById('siExploreL').textContent=t('exploreL');
  document.getElementById('exploreBtn').textContent=pickOpen?t('hidePick'):t('exploreBtn');
  document.getElementById('passHint').textContent=t('passHintNew');
  document.getElementById('siFoot').innerHTML=t('foot')+' <b>Accelerated Experiences, LLC</b>';
  document.getElementById('authSubmit').textContent=authMode==='signin'?t('signinBtn'):t('createBtn');
  document.getElementById('fName').style.display=authMode==='create'?'block':'none';
  document.getElementById('strWrap').style.display=authMode==='create'?'block':'none';
  document.getElementById('passHint').style.display=authMode==='create'?'block':'none';
  document.getElementById('aPass').setAttribute('autocomplete',authMode==='create'?'new-password':'current-password');
  document.getElementById('tabSignin').classList.toggle('on',authMode==='signin');document.getElementById('tabSignin').setAttribute('aria-selected',(authMode==='signin').toString());
  document.getElementById('tabCreate').classList.toggle('on',authMode==='create');document.getElementById('tabCreate').setAttribute('aria-selected',(authMode==='create').toString());
}
function authTab(m){authMode=m;['eName','eEmail','ePass','eForm'].forEach(function(id){document.getElementById(id).textContent='';});paintSignin();}
function togglePeek(){peek=!peek;document.getElementById('aPass').type=peek?'text':'password';document.getElementById('peekBtn').textContent=peek?t('hide'):t('show');}
function togglePick(){pickOpen=!pickOpen;document.getElementById('pickWrap').style.display=pickOpen?'block':'none';document.getElementById('exploreBtn').textContent=pickOpen?t('hidePick'):t('exploreBtn');if(pickOpen)renderPick();}
document.getElementById('aPass').addEventListener('input',function(){
  if(authMode!=='create')return;var issues=Auth.passIssues(this.value);var score=3-issues.length;var bar=document.getElementById('strBar');
  var w=[8,38,70,100][Math.max(0,score)];var col=['#c0503f','#c0503f','#c9992f','#3f6b2b'][Math.max(0,score)];bar.style.width=w+'%';bar.style.background=col;
});
function authErrMsg(code){var m={name:t('errName'),email_invalid:t('errEmailInvalid'),pass_rules:t('errPassRules'),exists:t('errExists'),login:t('errLogin')};return m[code];}
function submitAuth(e){
  e.preventDefault();
  ['eName','eEmail','ePass','eForm'].forEach(function(id){document.getElementById(id).textContent='';});
  ['aName','aEmail','aPass'].forEach(function(id){var el=document.getElementById(id);el.classList.remove('bad');el.setAttribute('aria-invalid','false');});
  var name=document.getElementById('aName').value,email=document.getElementById('aEmail').value,pass=document.getElementById('aPass').value;
  var btn=document.getElementById('authSubmit');btn.disabled=true;var oldTxt=btn.textContent;btn.innerHTML='<span class="spinner"></span>';
  var promise=authMode==='create'?Auth.register({name:name,email:email,password:pass}):Auth.login({email:email,password:pass});
  promise.then(function(r){
    btn.disabled=false;btn.textContent=oldTxt;
    if(!r.ok){
      var map={name:'eName',email:'eEmail',password:'ePass',form:'eForm'};
      var eid=map[r.field]||'eForm';
      document.getElementById(eid).textContent=authErrMsg(r.code)||r.error||t('errGeneric');
      var inp={name:'aName',email:'aEmail',password:'aPass'}[r.field];
      if(inp){var el=document.getElementById(inp);el.classList.add('bad');el.setAttribute('aria-invalid','true');el.focus();}
      else{document.getElementById('aPass').focus();}
      return;
    }
    // signed in; if no patient linked yet (fresh account) link to a sample so the demo has data
    var s=Auth.session();if(s&&s.patientIdx==null&&PATIENTS.length){Auth.linkPatient(0);}
    if(!current()){document.getElementById('eForm').textContent=t('errGeneric');return;}
    toast(authMode==='create'?t('welcomeBack'):(t('hello')+'!'),'good');
    location.hash='#home';boot();
  }).catch(function(){btn.disabled=false;btn.textContent=oldTxt;document.getElementById('eForm').textContent=t('errGeneric');});
  return false;
}
function forgot(){
  var email=document.getElementById('aEmail').value;
  Auth.requestReset(email).then(function(){toast(t('toastReset'));});
}
function renderPick(){
  document.getElementById('pickGrid').innerHTML=PATIENTS.map(function(p,i){
    return '<button class="pcard" onclick="enterDemo('+i+')"><div class="pn">'+esc(clean(p.name))+'</div>'+
      '<div class="pm">'+esc(ageOf(p.dob))+' · '+esc(p.sex||'')+'</div><span class="ptag">'+esc(p.tag||'')+'</span></button>';
  }).join('');
}
function enterDemo(i){Auth.demoEnter(i,clean(PATIENTS[i].name));location.hash='#home';boot();}
function signOut(){Auth.signOut();location.hash='';boot();}

/* ================= language ================= */
function setLang(l){lang=l;try{localStorage.setItem('bb_pt_lang',l)}catch(e){}
  document.documentElement.lang=(l==='vi'?'vi':'en');
  ['lEn','lEn2'].forEach(function(id){var e=document.getElementById(id);if(e){e.classList.toggle('on',l==='en');e.setAttribute('aria-pressed',(l==='en').toString());}});
  ['lVi','lVi2'].forEach(function(id){var e=document.getElementById(id);if(e){e.classList.toggle('on',l==='vi');e.setAttribute('aria-pressed',(l==='vi').toString());}});
  var appVisible=!document.getElementById('app').classList.contains('hide');
  if(appVisible&&current()){buildMenu();document.getElementById('secTxt').textContent=t('secTxt');document.getElementById('footBuilt').textContent=t('built');var cur=(location.hash||'#home').slice(1);go(VIEWS[cur]?cur:'home');}
  else{paintSignin();if(pickOpen)renderPick();}
}

/* ================= idle security ================= */
var idleTimer=null,idleWarned=false;
function armIdle(){
  clearInterval(idleTimer);idleWarned=false;
  idleTimer=setInterval(function(){
    if(!Auth.session()){clearInterval(idleTimer);return;}
    var left=Auth.msLeft();
    if(left<=0){clearInterval(idleTimer);Auth.signOut();location.hash='';boot();showSignedOut();return;}
    if(left<=120000&&!idleWarned){idleWarned=true;showIdleBar();}
  },5000);
}
function showIdleBar(){
  var v=document.getElementById('view');if(document.getElementById('idleBar'))return;
  var bar=document.createElement('div');bar.className='idlebar';bar.id='idleBar';
  bar.innerHTML='⏳ '+esc(t('idleWarn'))+'<button onclick="stayIn()">'+esc(t('staySignedIn'))+'</button>';
  v.insertBefore(bar,v.firstChild);
}
function stayIn(){Auth.touch();idleWarned=false;var b=document.getElementById('idleBar');if(b)b.remove();}
function showSignedOut(){var r=document.getElementById('siRibbon');r.innerHTML='🔒 '+esc(t('signedOutIdle'));r.style.background='var(--info-soft)';r.style.color='var(--info)';}
['click','keydown','mousemove','touchstart'].forEach(function(ev){document.addEventListener(ev,function(){if(Auth.session())Auth.touch();},{passive:true});});

/* ================= mobile side ================= */
function closeSideMobile(){document.getElementById('side').classList.remove('open');document.getElementById('scrim2').classList.remove('on');}
document.getElementById('burger').addEventListener('click',function(){var s=document.getElementById('side');s.classList.toggle('open');document.getElementById('scrim2').classList.toggle('on',s.classList.contains('open'));});
document.getElementById('scrim2').addEventListener('click',closeSideMobile);
document.addEventListener('keydown',function(e){
  var teleOpen=document.getElementById('tele').classList.contains('on');
  var sheetOpen=document.getElementById('scrim').classList.contains('on');
  if(e.key==='Escape'){if(teleOpen){leaveTele();return;}if(sheetOpen){closeSheet();return;}closeMenu();closeSideMobile();}
  else if(e.key==='Tab'){if(sheetOpen)trapTab(e,document.getElementById('sheet'));else if(teleOpen)trapTab(e,document.getElementById('tele'));}
});

/* ================= boot ================= */
function boot(){
  // paint language toggles
  ['lEn','lEn2'].forEach(function(id){var e=document.getElementById(id);if(e){e.classList.toggle('on',lang==='en');e.setAttribute('aria-pressed',(lang==='en').toString());}});
  ['lVi','lVi2'].forEach(function(id){var e=document.getElementById(id);if(e){e.classList.toggle('on',lang==='vi');e.setAttribute('aria-pressed',(lang==='vi').toString());}});
  document.documentElement.lang=(lang==='vi'?'vi':'en');
  if(!window.__stChk){window.__stChk=true;if(!storageOK())setTimeout(function(){toast(t('storageWarn'),'bad');},600);}
  var s=Auth.session();var p=current();
  if(!s||!p){
    document.getElementById('signin').classList.remove('hide');
    document.getElementById('app').classList.add('hide');
    document.getElementById('demoFlag').style.display=Auth.getMode()==='demo'?'block':'none';
    paintSignin();if(pickOpen)renderPick();
    return;
  }
  document.getElementById('signin').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('demoFlag').style.display=Auth.getMode()==='demo'?'block':'none';
  var pr=profileData()||{};var disp=pr.name||clean(p.name);
  document.getElementById('whoName').textContent=disp;
  document.getElementById('topName').textContent=pr.pref||firstName(disp);
  document.getElementById('whoAv').textContent=initials(disp);
  document.getElementById('topAv').textContent=initials(disp);
  document.getElementById('whoRole').textContent=(lang==='vi'?'Bệnh nhân':'Patient');
  document.getElementById('secTxt').textContent=t('secTxt');
  document.getElementById('footBuilt').textContent=t('built');
  buildMenu();armIdle();
  var key=(location.hash||'#home').slice(1);if(!VIEWS[key])key='home';go(key);
}
window.addEventListener('hashchange',function(){
  if(document.getElementById('app').classList.contains('hide'))return;
  var key=(location.hash||'#home').slice(1);if(!VIEWS[key])key='home';
  document.getElementById('pageTitle').textContent=t(TITLES[key]||'nHome');renderNav(key);
  var v=document.getElementById('view');v.innerHTML='';try{VIEWS[key]();}catch(e){}
});
boot();
</script>
</body>
