<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barry Burris, NMD — Practice Home</title>
<link rel="icon" type="image/png" id="fav">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--paper:#faf4e8;--card:#fffdf7;--cream:#f4ecdb;
--ink:#40352a;--ink2:#63543f;--mut:#8a7c68;--muted:#8a7c68;
--line:#e8dcc4;--line2:#f2ebda;
--gold:#c9992f;--gold2:#e6c67e;--goldsoft:#efdcae;--gold-soft:#f8efd6;
--teal:#31696a;--teal2:#25595a;--teal3:#1f4a4b;--teal-soft:#e4eeee;
--good:#4e7433;--good-soft:#eaf2e0;--warn:#b07a2e;--warn-soft:#f7edd8;--bad:#b3261e;--bad-soft:#f6e6e2;
--navy:#2c5f5a;--bg:#faf4e8;--r:16px;--shadow:0 12px 34px rgba(60,40,20,.09);
--side:#4a6b52;--side2:#3d5a45;--sideline:#3a5340;--sink:#f2f0e2;--smut:#c6d3bd}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.55 Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
h1,h2,h3{font-family:Fraunces,Georgia,serif}
a{color:inherit;text-decoration:none}
.app{display:flex;min-height:100vh}
.side{width:252px;flex:none;background:linear-gradient(180deg,var(--side),var(--side2));color:var(--sink);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;border-right:1px solid var(--sideline);transition:width .18s}
.side .brand{display:flex;align-items:center;gap:11px;padding:20px 16px 14px}
.side .brand img{width:42px;height:42px;border-radius:50%;flex:none;box-shadow:0 0 0 1px rgba(230,198,126,.35)}
.side .brand .bn{font-family:Fraunces,Georgia,serif;font-weight:700;font-size:18px;color:var(--gold2);line-height:1.06;letter-spacing:-.01em}
.side .brand .bt{font-family:Oswald,sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--smut);margin-top:3px}
.nav{flex:1;overflow-y:auto;padding:6px 12px}
.nav .grp{font-family:Oswald,sans-serif;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--smut);margin:15px 8px 5px;padding-top:12px;border-top:1px solid #3f5c48}
.nav .grp:first-child{margin-top:4px;padding-top:0;border-top:none}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:#d9e2d0;font-family:Oswald,sans-serif;font-weight:500;font-size:13px;letter-spacing:.045em;text-transform:uppercase;margin:2px 0;cursor:pointer;transition:background .15s,color .15s}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:linear-gradient(90deg,rgba(230,198,126,.16),rgba(230,198,126,.02));color:var(--sink);box-shadow:inset 3px 0 0 var(--gold2)}
.nav a svg{width:18px;height:18px;flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.side .foot{padding:13px 16px;border-top:1px solid var(--sideline);font-size:10.5px;color:#b3c3aa;line-height:1.5}
.side .foot b{color:var(--gold2);font-weight:600}
.side .foot .laneA{display:inline-block;background:rgba(230,198,126,.12);color:var(--gold2);border:1px solid rgba(230,198,126,.28);padding:1px 8px;border-radius:20px;font-family:Oswald,sans-serif;font-weight:600;font-size:9.5px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.app.collapsed .side{width:64px}
.app.collapsed .side .bn,.app.collapsed .side .bt,.app.collapsed .nav a span,.app.collapsed .nav .grp,.app.collapsed .side .foot .txt{display:none}
.app.collapsed .side .brand{justify-content:center;padding:16px 0}
.app.collapsed .nav a{justify-content:center;padding:10px 0}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:5;background:rgba(250,244,232,.88);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:12px 22px}
.burger{border:0;background:transparent;cursor:pointer;padding:7px;border-radius:8px;color:var(--teal)}
.burger:hover{background:var(--cream)}
.top .hi{font-family:Fraunces,Georgia,serif;font-weight:700;font-size:17px;color:var(--teal2)}
.top .hi small{display:block;font-family:Inter,sans-serif;font-weight:500;font-size:12px;color:var(--mut);letter-spacing:.2px}
.top .sp{flex:1}
.top .search{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;min-width:200px;font:inherit;color:var(--ink)}
.top .search:focus{outline:none;border-color:var(--gold)}
.top .av{width:40px;height:40px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(80,55,20,.18);cursor:pointer}
.wrap{padding:24px 22px;max-width:1200px;width:100%}
.ph{font-family:Fraunces,Georgia,serif;font-size:26px;font-weight:700;letter-spacing:-.3px;margin:0 0 3px;color:var(--teal2)}
.psub{color:var(--mut);margin:0 0 18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px 19px;box-shadow:var(--shadow)}
.card h3{margin:0 0 13px;font-family:Fraunces,Georgia,serif;font-weight:700;font-size:16px;letter-spacing:-.1px;color:var(--teal2)}
.grid{display:grid;gap:16px}
.tiles{grid-template-columns:repeat(auto-fit,minmax(172px,1fr))}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:0 4px 14px rgba(60,40,20,.05);transition:transform .12s,box-shadow .12s,border-color .12s}
.tile:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(60,40,20,.10);border-color:var(--gold2)}
.tile .l{font-family:Oswald,sans-serif;font-size:11px;color:var(--mut);font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.tile .v{font-family:Fraunces,Georgia,serif;font-size:27px;font-weight:700;margin-top:6px;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:var(--ink)}
.tile .s{font-size:12px;margin-top:3px;color:var(--mut)}
.tile .s.up{color:var(--good)}.tile .s.down{color:var(--bad)}
.pill{display:inline-block;font-family:Oswald,sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 9px;border-radius:20px;white-space:nowrap}
.pill.ok{background:var(--good-soft);color:var(--good)}.pill.open{background:var(--warn-soft);color:var(--warn)}
.pill.bad{background:var(--bad-soft);color:var(--bad)}.pill.new{background:var(--teal-soft);color:var(--teal2)}.pill.mut{background:var(--cream);color:var(--mut)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-family:Oswald,sans-serif;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line)}
td{padding:11px 10px;border-bottom:1px solid var(--line2)}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:var(--cream)}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:9px 13px;font-weight:600;font-size:13px;cursor:pointer;color:var(--ink);transition:filter .12s,border-color .12s,background .12s}
.btn:hover{border-color:var(--gold2);background:#fff}
.btn.p{background:linear-gradient(180deg,var(--teal),var(--teal2));border-color:var(--teal2);color:#fff}
.btn.p:hover{filter:brightness(1.06)}
.btn.g{background:linear-gradient(180deg,#2b241a,#1c1710);border-color:#1c1710;color:var(--gold2)}
.btn.g:hover{filter:brightness(1.14)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.hero{background:linear-gradient(120deg,var(--teal3) 0%,var(--teal) 100%);color:#eafafb;border-radius:20px;padding:24px 26px;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden;box-shadow:0 14px 34px rgba(10,74,80,.22)}
.hero img{width:70px;height:70px;border-radius:50%;border:2px solid rgba(230,198,126,.55);flex:none}
.hero .g{font-family:Fraunces,Georgia,serif;font-size:24px;font-weight:700}
.hero .sub{color:#c9e8ea;font-size:13.5px;margin-top:4px}
.hero .seal{position:absolute;right:-22px;top:-22px;width:150px;height:150px;opacity:.16;border:none}
.two{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.list .it{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2)}
.list .it:last-child{border-bottom:0}
.time{font-family:Fraunces,Georgia,serif;font-weight:600;font-variant-numeric:tabular-nums;color:var(--navy);min-width:72px;font-size:14px}
.it .nm{font-weight:600}.it .meta{font-size:12px;color:var(--mut)}
.muted{color:var(--mut)}.gold{color:var(--gold)}.rt{text-align:right}.teal{color:var(--teal2)}
.qa{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qa .btn{justify-content:flex-start}
.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2)}
.check:last-child{border-bottom:0}.check input{width:17px;height:17px;accent-color:var(--teal)}
.check.done label{text-decoration:line-through;color:var(--mut)}
.notes{width:100%;min-height:104px;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;resize:vertical;background:var(--card);color:var(--ink)}
.notes:focus{outline:none;border-color:var(--gold)}
.bars{display:flex;align-items:flex-end;gap:9px;height:130px;margin-top:6px}
.bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bars .bar{width:100%;background:linear-gradient(180deg,var(--teal),var(--teal3));border-radius:6px 6px 0 0}
.bars .cap{font-family:Oswald,sans-serif;font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
.svc{display:grid;grid-template-columns:repeat(auto-fit,minmax(238px,1fr));gap:14px}
.svc .c{border:1px solid var(--line);border-radius:14px;padding:16px;background:var(--card);display:flex;flex-direction:column;gap:8px;box-shadow:0 4px 14px rgba(60,40,20,.04)}
.svc .c .nm{font-family:Fraunces,Georgia,serif;font-weight:700;font-size:16px}
.svc .c .ds{font-size:12.5px;color:var(--mut);flex:1}
.svc .c .pr{font-family:Fraunces,Georgia,serif;font-size:22px;font-weight:700;color:var(--navy)}
.svc .c .pr small{font-size:12px;color:var(--mut);font-weight:400;font-family:Inter,sans-serif}
.gate{background:var(--gold-soft);border:1px solid var(--goldsoft);border-radius:12px;padding:15px 17px;color:#7a5f22}
.ixpath{border:1px solid var(--line);border-radius:99px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:Inter,sans-serif}
.ixpath.intl{background:var(--good-soft);color:var(--good);border-color:#bcd3ab}
.ixpath.us{background:var(--warn-soft);color:var(--warn);border-color:#e7d29a}
.ixseg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.ixseg button{border:none;background:var(--card);padding:8px 13px;font:inherit;font-size:12.5px;font-weight:600;color:var(--mut);cursor:pointer}
.ixseg button.on{background:var(--teal);color:#fff}
.ixtgl{width:40px;height:22px;border-radius:99px;background:#d8ccb4;position:relative;display:inline-block;cursor:pointer;transition:.2s;vertical-align:middle;flex:none}
.ixtgl .dot{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.ixtgl.on{background:var(--teal)}.ixtgl.on .dot{transform:translateX(18px)}
.gate b{color:#5f4a15}
.rev{border:1px solid var(--line);border-radius:12px;padding:15px;background:var(--card)}
.stars{color:var(--gold);letter-spacing:2px}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.kv:last-child{border-bottom:0}.kv .k{color:var(--mut)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#221a12;color:#f4e8d0;padding:11px 17px;border-radius:10px;font-size:13px;box-shadow:0 8px 28px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.toast.show{opacity:1}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
@media(max-width:920px){.two{grid-template-columns:1fr}.side{position:fixed;z-index:30;box-shadow:2px 0 18px rgba(0,0,0,.35)}.main{margin-left:64px}}

@media(max-width:640px){
 .wrap{padding:16px 12px}
 .top{padding:10px 12px;gap:8px}
 .top .search{min-width:0;flex:1;width:auto}
 .top .hi{font-size:15px}
 table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
 .hero{flex-direction:column;text-align:center;align-items:center;padding:20px}
 .hero .seal{display:none}
 .ph{font-size:21px}
 .qa{grid-template-columns:1fr}
}
/* Intakes inbox (additive) */
.ixlist{display:flex;flex-direction:column}
.ixrow{display:flex;align-items:center;gap:14px;padding:13px 12px;border-bottom:1px solid var(--line2)}
.ixrow:last-child{border-bottom:0}
.ixrow:hover{background:var(--cream)}
.ixav{width:40px;height:40px;flex:none;border-radius:50%;background:linear-gradient(180deg,var(--teal-soft),#fff);border:1px solid var(--teal-soft);color:var(--teal3);font-family:Fraunces,Georgia,serif;font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center}
.ixmain{flex:1;min-width:0}
.ixname{font-weight:700;font-size:14.5px;color:var(--ink)}
.ixmeta{font-weight:500;font-size:12.5px;color:var(--mut)}
.ixtag{margin-left:5px;vertical-align:1px}
.ixcc{font-size:13px;color:var(--ink2);margin-top:2px;line-height:1.45}
.ixchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.ixchip{display:inline-block;background:var(--teal-soft);color:var(--teal3);border:1px solid #cfe6e7;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.ixact{display:flex;flex-direction:column;gap:7px;flex:none;align-items:stretch}
.ixsampletag{display:inline-block;background:var(--gold-soft);color:#7a5f22;border:1px solid var(--goldsoft);font-family:Oswald,sans-serif;font-size:9.5px;font-weight:600;letter-spacing:.06em;padding:2px 9px;border-radius:20px;vertical-align:3px;margin-left:4px}
.ixcount{display:inline-block;background:var(--teal-soft);color:var(--teal2);font-family:Oswald,sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;padding:2px 10px;border-radius:20px;vertical-align:3px;margin-left:6px}
@media(max-width:640px){.ixrow{flex-wrap:wrap}.ixact{flex-direction:row;width:100%}.ixact .btn{flex:1;justify-content:center}}
/* Answers recap modal (additive) */
.axoverlay{display:none;position:fixed;inset:0;z-index:60;background:rgba(30,22,12,.5);align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto}
.axmodal{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 60px rgba(30,20,10,.35);max-width:640px;width:100%;padding:20px 22px 22px}
.axhd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.axname{font-family:Fraunces,Georgia,serif;font-weight:700;font-size:20px;color:var(--teal2)}
.axmeta{font-size:12.5px;color:var(--mut);margin-top:2px}
.axx{border:0;background:transparent;font-size:26px;line-height:1;color:var(--mut);cursor:pointer;padding:0 4px}
.axx:hover{color:var(--ink)}
.axsec{font-family:Oswald,sans-serif;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:600;margin:16px 0 6px}
.axtext{font-size:13.5px;color:var(--ink);line-height:1.5}
.axscores{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.axsc{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:9px;text-align:center}
.axk{font-family:Oswald,sans-serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
.axv{font-family:Fraunces,Georgia,serif;font-size:20px;font-weight:700;color:var(--teal3)}
.axv span{font-size:11px;color:var(--mut);font-weight:400}
.axgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.axul{margin:4px 0 0;padding-left:18px;font-size:13px}.axul li{margin:3px 0}
.axnone{font-size:13px;color:var(--mut);font-style:italic}
.axnote{margin-top:16px;background:#f6f2fc;border:1px dashed #c9b8ec;color:#5a4a86;border-radius:10px;padding:11px 13px;font-size:12.5px;line-height:1.5}
.axactions{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
@media(max-width:640px){.axscores{grid-template-columns:repeat(2,1fr)}.axgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="bb-auth.js"></script>
<div class="app" id="app">
  <aside class="side">
    <div class="brand"><img id="brandCoin" alt="BB"><div><div class="bn">Barry Burris</div><div class="bt">NMD · Functional Medicine</div></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot"><div class="txt">Barry Burris, NMD · Functional Medicine &amp; Longevity<br>Built by <b>Accelerated Experiences, LLC</b></div></div>
  </aside>
  <div class="main">
    <div class="top">
      <button class="burger" onclick="document.getElementById('app').classList.toggle('collapsed')" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="hi" id="greet">Welcome</div>
      <div class="sp"></div>
      <input class="search" placeholder="Search patients, invoices…" onkeydown="if(event.key==='Enter')toast('search would filter your records')">
      <span id="rolechip" style="font-size:11.5px;color:var(--muted);white-space:nowrap"></span>
      <img class="av" id="avImg" alt="Barry Burris" onclick="go('profile')" title="Profile">
    </div>
    <div class="wrap" id="view"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="bb-intakes.js"></script>

 <div class="svc">${DATA.protocols.map(p=>`<div class="c"><span class="pill mut" style="align-self:flex-start">${p.c}</span><div class="nm">${p.t}</div><div class="ds">${p.d}</div><button class="btn sm" onclick="toast('open protocol')">Open</button></div>`).join('')}</div>
 <div class="gate" style="margin-top:16px">Educational reference for your own use. Treatment decisions and documentation stay with you — the library informs, it doesn't prescribe.</div>`;
}

 return pageHead('Growth','Leads, reputation & reach for the practice.')+`
 <div class="two">
  <div class="card"><div class="sec-h"><h3 style="margin:0">Lead pipeline</h3><button class="btn sm p" onclick="toast('add lead')">＋ Add</button></div>
   <table><thead><tr><th>Name</th><th>Source</th><th>Interest</th><th>Status</th></tr></thead><tbody>
   ${DATA.leads.length?DATA.leads.map(l=>`<tr><td><b>${l.n}</b></td><td>${l.src}</td><td>${l.want}</td><td><span class="pill ${l.st}">${l.st==='ok'?'Converting':l.st==='new'?'New':'Nurturing'}</span></td></tr>`).join(''):`<tr><td colspan="4" class="muted" style="padding:12px">No leads yet.</td></tr>`}
   </tbody></table></div>
  <div class="grid" style="gap:16px">
   <div class="card"><h3>Public page</h3><div class="muted">Your bio, services & booking link — matches this brand. <button class="btn sm p" onclick="toast('a matching public site would deploy here')">Preview site</button></div></div>
   <div class="card"><h3>Content ideas</h3><div class="muted">• “What longevity labs actually matter”<br>• Peptides 101 (honest version)<br>• Testosterone: myths vs monitoring</div></div>
  </div></div>
 <div class="card" style="margin-top:16px"><h3>What patients say</h3>
  <div class="svc">${DATA.reviews.length?DATA.reviews.map(r=>`<div class="rev"><div class="stars">${'★'.repeat(r.r)}</div><div style="margin:8px 0;font-size:13.5px">“${r.t}”</div><div class="muted">— ${r.n}</div></div>`).join(''):`<div class="muted">No reviews yet.</div>`}</div></div>`;
}

 return pageHead('Profile','Your identity, brand & compliance status.')+`
 <div class="two">
  <div class="card" style="display:flex;gap:16px;align-items:center"><img src="barry-medallion.png" style="width:96px;height:96px;border-radius:50%">
   <div><div style="font-size:20px;font-weight:800">Barry Burris, NMD</div><div class="teal muted">Functional Medicine & Longevity</div>
   <div style="margin-top:10px">
    <div class="kv"><span class="k">Credential</span><span>NMD — Naturopathic Medical Doctor</span></div>
    <div class="kv"><span class="k">Education</span><span>Bastyr University</span></div>
    <div class="kv"><span class="k">Practice</span><span>Independent · Telehealth</span></div>
    <div class="kv"><span class="k">Focus</span><span>Longevity, hormones, metabolic, peptides</span></div>
   </div></div></div>
  <div class="grid" style="gap:16px">
   <div class="card"><h3>Brand</h3><div style="display:flex;align-items:center;gap:14px"><img src="bee-coin.svg" style="width:60px;height:60px;border-radius:50%"><div class="muted">Barry's bee mark carries across every page, the SOAP tool, and (soon) your public site. <button class="btn sm" onclick="toast('brand kit lives in the Barry Burris — Brand folder')">Brand kit</button></div></div></div>
   <div class="card"><h3>Compliance status</h3>
    <div class="kv"><span class="k">Lane A · operations</span><span class="pill ok">Live</span></div>
    <div class="kv"><span class="k">Lane B · clinical charting</span><span class="pill open">Prototype</span></div>
    <div class="muted" style="margin-top:8px;font-size:12.5px">Before any real patient data: BAA hosting, encryption at rest + in transit, access controls, audit logging & a breach protocol.</div></div>
  </div></div>
 <div class="card" style="margin-top:16px;text-align:center;color:var(--muted)">One door · one ledger · no smoke — Built by <b>Accelerated Experiences, LLC</b></div>`;

function escT(s){return String(s==null?'':s).replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
function roleOpts(sel){return Object.keys(BBAuth.ROLES).filter(function(k){return k!=='owner';}).map(function(k){return '<option value="'+k+'" '+(sel===k?'selected':'')+'>'+BBAuth.ROLES[k].label+'</option>';}).join('');}
function renderTeam(){
  if(!BBAuth.can('team.manage'))return pageHead('Team','Employees & privileges.')+'<div class="gate"><b>Owner only.</b> Ask Barry to add or change team members.</div>';
  var team=BBAuth.getTeam();
  var rows=team.length?team.map(function(m){return '<tr><td><b>'+escT(m.name)+'</b></td><td>'+BBAuth.roleLabel(m.role)+'</td><td class="muted">'+escT(m.email||'')+'</td><td class="rt"><button class="btn sm" onclick="rmTeam(\''+m.id+'\')">Remove</button></td></tr>';}).join(''):'<tr><td colspan="4" class="muted" style="padding:12px">No employees yet — add your first below.</td></tr>';
  var caps=Object.keys(BBAuth.ROLES).map(function(k){var r=BBAuth.ROLES[k];return '<div class="c"><div class="nm">'+r.icon+' '+r.label+'</div><div class="ds">'+r.desc+'</div></div>';}).join('');
  var inp='width:100%;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 11px;font:inherit;font-size:14px';
  return pageHead('Team & privileges','Add the people who work in the practice and choose what each can do — they pick their name at sign-in.')+
   '<div class="card"><div class="sec-h"><h3 style="margin:0">People</h3></div>'+
   '<table><thead><tr><th>Name</th><th>Role</th><th>Email</th><th></th></tr></thead><tbody>'+
   '<tr><td><b>Barry Burris, NMD</b></td><td>Owner / Provider</td><td class="muted">you</td><td class="rt muted">full access</td></tr>'+
   rows+'</tbody></table>'+
   '<div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
     '<div><div class="muted" style="font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:5px">Name</div><input id="tName" style="'+inp+'" placeholder="e.g. Linh Nguyen"></div>'+
     '<div><div class="muted" style="font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:5px">Role</div><select id="tRole" style="'+inp+'">'+roleOpts('frontdesk')+'</select></div>'+
   '</div>'+
   '<div style="margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap"><input id="tEmail" style="'+inp+';max-width:280px" placeholder="Email (optional)"><button class="btn p" onclick="addTeam()">＋ Add employee</button></div>'+
   '</div>'+
   '<div class="card" style="margin-top:16px"><h3>What each role can do</h3><div class="svc">'+caps+'</div></div>'+
   '<div class="gate" style="margin-top:16px">Team &amp; sign-in are open right now (no password needed). When you\'re ready, flip one switch to require sign-in — employees keep exactly the access you set here.</div>';
}
function addTeam(){var n=(document.getElementById('tName').value||'').trim();if(!n){document.getElementById('tName').focus();return;}BBAuth.addMember({name:n,role:document.getElementById('tRole').value,email:(document.getElementById('tEmail').value||'').trim()});toast('Added '+n);go('team');}
function rmTeam(id){if(!confirm('Remove this employee?'))return;BBAuth.removeMember(id);toast('Removed');go('team');}
/* ---- Intakes inbox (SAMPLE demo of the questionnaire -> AI-drafted SOAP loop) ---- */
function bbIxAge(dob){try{var b=new Date(dob),n=new Date();var a=n.getFullYear()-b.getFullYear();if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;return a;}catch(e){return '';}}
function bbIxSub(iso){try{var d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return iso;}}
function bbIxClean(name){return String(name==null?'':name).replace(/\s*\(SAMPLE\)\s*/i,'').trim();}
function bbIxInitials(name){var p=bbIxClean(name).split(/\s+/).filter(Boolean);if(!p.length)return '?';var f=p[0].charAt(0)||'';var l=p.length>1?p[p.length-1].charAt(0):'';return (f+l).toUpperCase();}
function bbIxShortFlag(f){var m=String(f).match(/\(([^)]+)\)/);return m?m[1]:f;}
function bbIxUrl(p){return SOAP+'?intake='+encodeURIComponent(p.b64);}
function renderIntakes(){
 var full=((window.BB_INTAKES||[]).slice()).sort(function(a,b){return (b.submitted||'').localeCompare(a.submitted||'');});
 var flt=window.BB_IX_FILTER||'all';
 var reg=function(p){return BBRegion.regionOf(p);};
 var counts={all:full.length,intl:full.filter(function(p){return reg(p)==='intl';}).length,us:full.filter(function(p){return reg(p)==='us';}).length};
 var list=full.filter(function(p){return flt==='all'||reg(p)===flt;});
 window.BB_IX_VIEW=list;
 var n=list.length, usLive=BBRegion.usLive();
 var head='<div class="ph">Patient intakes <span class="ixcount">'+counts.all+' new</span><span class="ixsampletag">SAMPLE</span></div>'
  +'<div class="psub">Questionnaires patients submitted through the portal — each opens an AI-drafted SOAP note for you to review &amp; sign. The AI drafts history &amp; narrative only, never medications, doses or a diagnosis.</div>';
 var seg=function(k,label){return '<button class="'+(flt===k?'on':'')+'" onclick="bbSetIxFilter(\''+k+'\')">'+label+'</button>';};
 var controls='<div class="card" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px">'
   +'<div class="ixseg">'+seg('all','All ('+counts.all+')')+seg('intl','🌏 International ('+counts.intl+')')+seg('us','🇺🇸 U.S. ('+counts.us+')')+'</div>'
   +'<div style="flex:1;min-width:12px"></div>'
   +'<div style="display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--mut)"><span>U.S. (HIPAA) path</span><span class="ixtgl'+(usLive?' on':'')+'" onclick="bbToggleUsLive()" role="switch" aria-checked="'+usLive+'"><span class="dot"></span></span><b style="color:'+(usLive?'var(--good)':'var(--mut)')+'">'+(usLive?'Live':'Off')+'</b></div>'
   +'</div>';
 var explain='<div class="gate" style="margin-bottom:16px">🌏 <b>Two paths.</b> International patients (Vietnam &amp; outside the U.S.) use full telehealth right now — HIPAA doesn’t apply. U.S. patients wait for secure (HIPAA) mode; flip the toggle above when it’s ready. Tap a patient’s path chip to move them.</div>';
 if(!n)return head+controls+explain+'<div class="card"><div class="muted" style="padding:14px 2px">No patients on this path.</div></div>';
 var rows=list.map(function(p,i){
   var age=bbIxAge(p.dob), sx=(p.sex||'').charAt(0).toUpperCase();
   var chips=(p.flags||[]).map(function(f){return '<span class="ixchip">'+escT(bbIxShortFlag(f))+'</span>';}).join('');
   var r=reg(p),b=BBRegion.info(r),live=BBRegion.telehealthLive(r);
   var pathChip='<button class="ixpath '+r+'" onclick="bbToggleRegion('+i+')" title="Tap to switch this patient&#39;s path">'+b.flag+' '+b.short+((r==='us'&&!live)?' · pending':'')+'</button>';
   return '<div class="ixrow">'
     +'<div class="ixav">'+escT(bbIxInitials(p.name))+'</div>'
     +'<div class="ixmain">'
       +'<div class="ixname">'+escT(bbIxClean(p.name))+' <span class="ixmeta">· '+age+' '+sx+' · '+bbIxSub(p.submitted)+'</span>'+(p.tag?' <span class="pill mut ixtag">'+escT(p.tag)+'</span>':'')+'</div>'
       +'<div class="ixcc">'+escT(p.cc)+'</div>'
       +(chips?'<div class="ixchips">'+chips+'</div>':'')
     +'</div>'
     +'<div class="ixact">'
       +pathChip
       +'<a class="btn p sm" href="'+bbIxUrl(p)+'" target="_blank" rel="noopener">Open SOAP draft →</a>'
       +'<button class="btn sm" onclick="bbAnswers('+i+')">View answers →</button>'
     +'</div>'
   +'</div>';
 }).join('');
 return head+controls+explain+'<div class="card" style="padding:6px 8px"><div class="ixlist">'+rows+'</div></div>';
}
function bbSetIxFilter(f){window.BB_IX_FILTER=f;go('intakes');}
function bbToggleRegion(i){var p=(window.BB_IX_VIEW||[])[i];if(!p)return;BBRegion.toggleRegion(p);go('intakes');}
function bbToggleUsLive(){BBRegion.setUsLive(!BBRegion.usLive());go('intakes');}
function bbAnswers(i){
 var p=(window.BB_IX_VIEW||[])[i]; if(!p)return;
 var age=bbIxAge(p.dob), sc=p.scores||{};
 var scoreRow=[['Energy',sc.energy],['Libido',sc.libido],['Sleep',sc.sleep],['Mood',sc.mood]].map(function(s){return '<div class="axsc"><div class="axk">'+s[0]+'</div><div class="axv">'+(s[1]==null?'—':s[1]+'<span>/10</span>')+'</div></div>';}).join('');
 var meds=(p.meds&&p.meds!=='None')?('<ul class="axul">'+p.meds.split('\n').filter(Boolean).map(function(m){return '<li>'+escT(m)+'</li>';}).join('')+'</ul>'):'<div class="axnone">None reported</div>';
 var flags=(p.flags||[]).map(function(f){return '<span class="ixchip">'+escT(f)+'</span>';}).join('')||'<span class="axnone">None</span>';
 var labs=(p.labs&&p.labs.length)?('<ul class="axul">'+p.labs.map(function(l){return '<li>'+escT(l)+'</li>';}).join('')+'</ul>'):'<div class="axnone">No attachments</div>';
 var html='<div class="axmodal" role="dialog" aria-modal="true">'
   +'<div class="axhd"><div><div class="axname">'+escT(bbIxClean(p.name))+'</div>'
     +'<div class="axmeta">'+age+' · '+escT(p.sex||'')+' · DOB '+escT(p.dob||'')+' · submitted '+bbIxSub(p.submitted)+'<span class="ixsampletag" style="vertical-align:1px">SAMPLE</span></div></div>'
     +'<button class="axx" onclick="bbCloseModal()" aria-label="Close">×</button></div>'
   +'<div class="axsec">Chief concern &amp; goals</div><div class="axtext">'+escT(p.cc)+'</div>'
   +'<div class="axsec">Self-ratings (0–10)</div><div class="axscores">'+scoreRow+'</div>'
   +'<div class="axsec">Focus areas (patient-reported)</div><div class="ixchips">'+flags+'</div>'
   +'<div class="axgrid"><div><div class="axsec">Current medications &amp; supplements</div>'+meds+'</div>'
   +'<div><div class="axsec">Allergies</div><div class="axtext">'+escT(p.allergies||'—')+'</div>'
   +'<div class="axsec">Uploaded labs</div>'+labs+'</div></div>'
   +'<div class="axnote">These are the patient’s own questionnaire answers (read-only recap). The AI-drafted HPI, review of systems and considerations appear in the SOAP note — history &amp; narrative only, never medications, doses or a diagnosis.</div>'
   +'<div class="axactions"><a class="btn p" href="'+bbIxUrl(p)+'" target="_blank" rel="noopener">Open AI-drafted SOAP note →</a><button class="btn" onclick="bbCloseModal()">Close</button></div>'
   +'</div>';
 var ov=document.getElementById('bbModal');
 if(!ov){ov=document.createElement('div');ov.id='bbModal';ov.className='axoverlay';ov.onclick=function(e){if(e.target===ov)bbCloseModal();};document.body.appendChild(ov);}
 ov.innerHTML=html; ov.style.display='flex'; document.addEventListener('keydown',bbIxEscKey);
}
function bbCloseModal(){var ov=document.getElementById('bbModal');if(ov)ov.style.display='none';document.removeEventListener('keydown',bbIxEscKey);}
function bbIxEscKey(e){if(e.key==='Escape')bbCloseModal();}
const VIEWS={home:renderHome,schedule:renderSchedule,patients:renderPatients,intakes:renderIntakes,charting:renderCharting,billing:renderBilling,services:renderServices,labs:renderLabs,protocols:renderProtocols,growth:renderGrowth,team:renderTeam,profile:renderProfile};
function go(k){setActive(k);document.getElementById('view').innerHTML=VIEWS[k]();window.scrollTo(0,0);if(k==='home'){const n=document.getElementById('notes');if(n)n.value=loadNotes();}if(window.innerWidth<920)document.getElementById('app').classList.add('collapsed');}
function loadNotes(){try{return localStorage.getItem('bb_notes')||''}catch(e){return ''}}
function saveNotes(v){try{localStorage.setItem('bb_notes',v)}catch(e){}}
document.getElementById('greet').innerHTML=`${greetWord}, Barry Burris <small>${dstr}</small>`;
BBAuth.requireGate();document.getElementById('rolechip').innerHTML=BBAuth.chipHTML();buildNav();var _h=(location.hash||'').replace('#','').trim();go(VIEWS[_h]?_h:'home');
</script>
